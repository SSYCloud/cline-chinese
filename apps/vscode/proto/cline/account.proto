syntax = "proto3";

package cline;

import "cline/common.proto";

option go_package = "github.com/cline/grpc-go/cline";
option java_multiple_files = true;
option java_package = "bot.cline.proto";

// Service for account-related operations
service AccountService {
  // Handles the user clicking the login link in the UI.
  // Generates a secure nonce for state validation, stores it in secrets,
  // and opens the authentication URL in the external browser.
  rpc accountLoginClicked(EmptyRequest) returns (String);

  // Handles the user clicking the logout button in the UI.
  // Clears API keys and user state.
  rpc accountLogoutClicked(EmptyRequest) returns (Empty);

  // Subscribe to auth status update events (when authentication state changes)
  rpc subscribeToAuthStatusUpdate(EmptyRequest) returns (stream AuthState);

  // Handles authentication state changes from the Firebase context.
  // Updates the user info in global state and returns the updated value.
  rpc shengSuanYunLoginClicked(EmptyRequest) returns (String);
  rpc shengSuanYunLogoutClicked(EmptyRequest) returns (Empty);
  rpc shengSuanYunUserData(EmptyRequest) returns (UserCreditsData);
  rpc subscribeSsyAuthCallback(EmptyRequest) returns (stream String);
  rpc authStateChanged(AuthStateChangedRequest) returns (AuthState);

  // Fetches all user credits data
  // (balance, usage transactions, payment transactions)
  // rpc getUserCredits(EmptyRequest) returns (UserCreditsData);

  // rpc getOrganizationCredits(GetOrganizationCreditsRequest) returns (OrganizationCreditsData);
  // Fetches all user organizations data
  // Returns a list of UserOrganization objects
  // rpc getUserOrganizations(EmptyRequest) returns (UserOrganizationsResponse);

  // rpc setUserOrganization(UserOrganizationUpdateRequest) returns (Empty);

  rpc openrouterAuthClicked(EmptyRequest) returns (Empty);

  rpc requestyAuthClicked(StringRequest) returns (Empty);

  rpc hicapAuthClicked(EmptyRequest) returns (Empty);

  // Returns a link the webview can use to redirect back to the user's IDE.
  rpc getRedirectUrl(EmptyRequest) returns (String);

  // OpenAI Codex OAuth authentication
  // Starts the OAuth flow and opens browser for user to sign in with ChatGPT Plus/Pro
  rpc openAiCodexSignIn(EmptyRequest) returns (Empty);

  // Signs out of OpenAI Codex and clears stored credentials
  rpc openAiCodexSignOut(EmptyRequest) returns (Empty);

  // Submits a spend limit increase request to the user's org admin.
  // Called when the user hits a SPEND_LIMIT_EXCEEDED (429) error and clicks "Request Increase".
  rpc submitLimitIncreaseRequest(EmptyRequest) returns (SubmitLimitIncreaseResponse);

  // Fetches all enterprise projects for the current SSY user
  // (project info, models, routers, API keys)
  rpc getEnterpriseProjectList(EmptyRequest) returns (EProjectList);

  // Fetches enterprise gateway bills for the given project and time range
  rpc getEnterpriseBill(EnterpriseBillRequest) returns (EnterpriseBillResponse);
}

message AuthStateChangedRequest {
  Metadata metadata = 1;
  UserInfo user = 2;
}

message AuthState {
  optional UserInfo user = 1;
}

// User's information
message UserInfo {
  string uid = 1;
  optional string display_name = 2;
  optional string email = 3;
  optional string photo_url = 4;
  optional string app_base_url = 5; // Cline app base URL
  optional double balance = 6;
}

message UserOrganization {
  bool active = 1;
  string member_id = 2;
  string name = 3;
  string organization_id = 4;
  repeated string roles = 5; // ["admin", "member", "owner"]
}

message UserOrganizationsResponse {
  repeated UserOrganization organizations = 1;
}

message UserOrganizationUpdateRequest {
  optional string organization_id = 1;
}

message UserCreditsData {
  UserCreditsBalance balance = 1;
  repeated UsageTransaction usage_transactions = 2;
  repeated PaymentTransaction payment_transactions = 3;
  optional UserInfo user = 4;
  optional float rate = 5;
}

message GetOrganizationCreditsRequest {
  string organization_id = 1;
}

message OrganizationCreditsData {
  UserCreditsBalance balance = 1;
  string organization_id = 2;
  repeated OrganizationUsageTransaction usage_transactions = 3;
}

message UserCreditsBalance {
  double current_balance = 1;
}

message UsageTransaction {
  string ai_inference_provider_name = 1;
  string ai_model_name = 2;
  string ai_model_type_name = 3;
  int32 completion_tokens = 4;
  double cost_usd = 5;
  string created_at = 6;
  double credits_used = 7;
  string generation_id = 8;
  string organization_id = 9;
  int32 prompt_tokens = 10;
  int32 total_tokens = 11;
  string user_id = 12;
  optional string spent_at = 13;
  optional string model = 14;
  optional string credits = 15;
  string operation = 16;
}

// Response from a spend limit increase request submission
message SubmitLimitIncreaseResponse {
  bool success = 1;
}

message PaymentTransaction {
  string paid_at = 1;
  string creator_id = 2;
  int32 amount_cents = 3;
  double credits = 4;
}

message OrganizationUsageTransaction {
  string ai_inference_provider_name = 1;
  string ai_model_name = 2;
  string ai_model_type_name = 3;
  int32 completion_tokens = 4;
  double cost_usd = 5;
  string created_at = 6;
  double credits_used = 7;
  string generation_id = 8;
  string organization_id = 9;
  int32 prompt_tokens = 10;
  int32 total_tokens = 11;
  string user_id = 12;
  string operation = 13;
}

// ShengSuanYun Enterprise Project structures

message EPModel {
  int32 id = 1;
  string name = 2;
  string type = 3;
  double input_price = 4;
  double output_price = 5;
  string input_price_unit = 6;
  string output_price_unit = 7;
  string other_price = 8;
  string provider = 9;
  int32 support_model_id = 10;
  string currency = 11;
  int32 context_length = 12;
  bool is_byok = 13;
}

message EPRouterModel {
  int32 id = 1;
  string model = 2;
  int32 model_info_id = 3;
  int32 weight = 4;
}

message EPRouter {
  int32 id = 1;
  string name = 2;
  string mode = 3;
  repeated EPRouterModel models = 4;
  bool is_confirmed = 5;
  string route_id = 6;
  string scope = 7;
  int32 created_by_ram_user_id = 8;
  string creator_name = 9;
  string creator_type = 10;
  string created_at = 11;
  string updated_at = 12;
  int32 updated_by_ram_user_id = 13;
  string updater_name = 14;
  string updater_type = 15;
  bool can_edit = 16;
  bool can_delete = 17;
}

message EPAPIKey {
  int32 id = 1;
  string created_at = 2;
  string updated_at = 3;
  int32 user_id = 4;
  bool is_banned = 5;
  bool is_expired = 6;
  string name = 7;
  string desc = 8;
  string key = 9;
  string token = 10;
  int32 tpm = 11;
  int32 rpm = 12;
  double max_quota = 13;
  double consumed_amount = 14;
  string supported_models = 15;
  bool is_default = 16;
  int32 ram_user_id = 17;
  int32 enterprise_gateway_project_id = 18;
}

message EProject {
  int32 id = 1;
  string name = 2;
  repeated EPModel models = 3;
  repeated EPRouter routers = 4;
  repeated EPAPIKey api_keys = 5;
}

message EProjectList {
  repeated EProject projects = 1;
}

message EnterpriseBillRequest {
  int32 project_id = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
  optional string start_time = 4;
  optional string end_time = 5;
  optional string model_name = 6;
}

message EnterpriseBillItem {
  string request_time = 1;
  string model_name = 2;
  string model_company = 3;
  int32 input_tokens = 4;
  int32 output_tokens = 5;
  int32 total_amount = 6;
  string user_name = 7;
  int32 ram_user_id = 8;
}

message EnterpriseBillResponse {
  repeated EnterpriseBillItem bills = 1;
}
